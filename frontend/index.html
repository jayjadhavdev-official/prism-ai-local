<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Prism AI Chat</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    </head>
    <body class="bg-black text-white font-mono h-screen flex flex-col">
        <header
            class="p-4 border-b border-zinc-800 bg-black flex items-center gap-3"
        >
            <img
                src="assets/logo.png"
                alt="Logo"
                class="w-8 h-8 rounded-full"
            />
            <div>
                <h1 class="text-lg font-bold tracking-tight">Prism AI</h1>
                <p class="text-xs text-green-400">● Agent Active</p>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 space-y-4" id="chat-container">
            <div class="flex justify-end">
                <div class="bg-blue-600 p-3 rounded-lg max-w-md">
                    Hello! Tell me about yourself.
                </div>
            </div>
            <div class="flex justify-start items-start gap-3">
                <img
                    src="assets/agent-avatar.png"
                    alt="AI"
                    class="w-8 h-8 rounded-full"
                />
                <div class="bg-zinc-900 p-3 rounded-lg max-w-md">
                    I am your locally hosted gemma4 model running on your
                    hardware.
                </div>
            </div>
        </main>

        <footer class="p-4 bg-black border-t border-zinc-800">
            <div class="flex gap-2 max-w-4xl mx-auto items-center">
                
                <button 
                    id="searchToggle" 
                    type="button"
                    class="px-3 py-2 text-xs font-mono rounded-lg bg-zinc-950 border border-zinc-800 text-zinc-500 hover:text-zinc-400 transition flex items-center gap-2 whitespace-nowrap h-[42px]"
                >
                    <span class="w-2 h-2 rounded-full bg-zinc-700 id-indicator transition-all duration-300"></span>
                    Web Search: OFF
                </button>

                <input
                    type="text"
                    id="user-input"
                    placeholder="Type your prompt here..."
                    class="flex-1 bg-zinc-900 border border-zinc-800 rounded-lg px-4 py-2 focus:outline-none focus:border-zinc-500 text-white h-[42px] font-mono placeholder:text-zinc-600"
                />
                <button
                    id="send-btn"
                    class="bg-zinc-600 hover:bg-zinc-700 px-6 py-2 rounded-lg font-medium transition h-[42px]"
                >
                    Send
                </button>
                
            </div>
        </footer>

        <script src="app.js"></script>
    </body>
</html>
